settings:
  # Локальная директория для промежуточных bare-клонов
  mirrors_dir: /mirrors

  # Уровень логирования: DEBUG, INFO, WARNING, ERROR
  log_level: INFO

  # Глобальный интервал синхронизации (секунды). Можно переопределить для каждого репо.
  schedule_interval: 3600

  # Таймаут одной git-операции (секунды)
  timeout: 300

  # Параллельных потоков синхронизации
  workers: 4

  webhook:
    enabled: true
    host: 0.0.0.0
    port: 8080
    # Bearer-токен для аутентификации:
    #   Authorization: Bearer <secret>
    # Можно задать напрямую или через переменную окружения:
    secret: "${WEBHOOK_SECRET}"

# ────────────────────────────────────────────────────────────────────────────
# Репозитории
# Схема: source → (local bare clone) → destination_1, destination_2 ...
#
# По умолчанию пушатся только ветки и теги:
#   +refs/heads/*:refs/heads/*
#   +refs/tags/*:refs/tags/*
#
# refs/pull/* (GitHub PR-рефы) не пушатся намеренно — большинство git-хостингов
# (Gitverse, Gitea, GitLab) отклоняют их хуком.
# ────────────────────────────────────────────────────────────────────────────
repositories:

  - name: my-project
    # Необязательно: переопределить интервал для этого репо (секунды)
    # schedule_interval: 1800
    source:
      url: https://github.com/original/my-project.git
    destinations:
      - name: gitlab
        url: https://oauth2:GITLAB_TOKEN@gitlab.com/mirror/my-project.git
      - name: gitea
        url: https://user:GITEA_TOKEN@gitea.example.com/mirror/my-project.git
      - name: bitbucket
        url: git@bitbucket.org:org/my-project.git
        ssh_key: /keys/bitbucket_ed25519
        # Необязательно: дополнительные refspecs поверх heads + tags
        # push_refs:
        #   - "+refs/notes/*:refs/notes/*"

  - name: private-service
    schedule_interval: 900  # каждые 15 минут
    source:
      url: git@github.com:company/private-service.git
      ssh_key: /keys/github_ed25519
    destinations:
      - name: internal-gitea
        url: git@gitea.internal:company/private-service.git
        ssh_key: /keys/gitea_ed25519
      - name: backup
        url: https://backup.example.com/private-service.git
        ssl_verify: false
