settings:
  # Локальная директория для промежуточных bare-клонов
  mirrors_dir: /mirrors

  # Уровень логирования: DEBUG, INFO, WARNING, ERROR
  log_level: INFO

  # Интервал обновления в режиме демона (секунды)
  schedule_interval: 3600

  # Таймаут одной git-операции (секунды)
  timeout: 300

  # Параллельных потоков (по числу репозиториев)
  workers: 4

# ────────────────────────────────────────────────────────────────────────────
# Репозитории
# Схема: source → (local bare clone) → destination_1, destination_2 ...
# ────────────────────────────────────────────────────────────────────────────
repositories:

  - name: my-project
    source:
      url: https://github.com/original/my-project.git
    destinations:
      - name: gitlab
        url: https://oauth2:GITLAB_TOKEN@gitlab.com/mirror/my-project.git
      - name: gitea
        url: https://user:GITEA_TOKEN@gitea.example.com/mirror/my-project.git
      - name: bitbucket
        url: git@bitbucket.org:org/my-project.git
        ssh_key: /keys/bitbucket_ed25519

  - name: private-service
    source:
      url: git@github.com:company/private-service.git
      ssh_key: /keys/github_ed25519
    destinations:
      - name: internal-gitea
        url: git@gitea.internal:company/private-service.git
        ssh_key: /keys/gitea_ed25519
      - name: backup
        url: https://backup.example.com/private-service.git
        ssl_verify: false
