services:
  reflection:
    build: .
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - mirrors:/mirrors
      - ./keys:/keys:ro    # SSH-ключи (опционально)
    ports:
      - "8080:8080"        # webhook (если включён в config.yaml)
    environment:
      - WEBHOOK_SECRET     # берётся из окружения хоста или .env файла
    restart: unless-stopped

volumes:
  mirrors:
