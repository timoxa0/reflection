services:
  reflection:
    build: .
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - mirrors:/mirrors
      - ./keys:/keys:roZ    # SSH-ключи (опционально)
    ports:
      - "8080:8080"        # webhook (если включён в config.yaml)
    environment:
      - WEBHOOK_SECRET
      - NL_TOKEN
    restart: unless-stopped

volumes:
  mirrors:
